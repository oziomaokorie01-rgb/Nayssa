<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senseii Hybrid Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between">

    <div>
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xs font-bold tracking-widest text-gray-500 uppercase">NAYSA ecosystem</h1>
                <h2 class="text-xl font-extrabold text-white">Senseii Hybrid Tutor</h2>
            </div>
            <label class="relative inline-flex items-center cursor-pointer" onclick="event.stopPropagation()">
                <input type="checkbox" id="networkToggle" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                <span class="ml-2 text-xs font-medium text-gray-400" id="networkStatusLabel">Online</span>
            </label>
        </header>

        <main class="bg-[#252529] rounded-2xl shadow-xl overflow-hidden border border-gray-800 mb-6">
            <nav class="flex border-b border-gray-800 bg-[#1F1F23]">
                <button id="tab-text" class="tab-btn flex-1 py-3 text-center text-sm font-semibold tab-active flex flex-col items-center gap-1">
                    <span>✍️</span><span class="text-xs">Text</span>
                </button>
                <button id="tab-docs" class="tab-btn flex-1 py-3 text-center text-sm font-semibold text-gray-400 flex flex-col items-center gap-1">
                    <span>📄</span><span class="text-xs">Docs</span>
                </button>
                <button id="tab-pics" class="tab-btn flex-1 py-3 text-center text-sm font-semibold text-gray-400 flex flex-col items-center gap-1">
                    <span>📸</span><span class="text-xs">Pictures</span>
                </button>
                <button id="tab-links" class="tab-btn flex-1 py-3 text-center text-sm font-semibold text-gray-400 flex flex-col items-center gap-1">
                    <span>🌐</span><span class="text-xs">Links</span>
                </button>
            </nav>

            <div class="p-4">
                <div id="textTab" class="tab-content">
                    <textarea id="notesInput" class="w-full h-40 bg-[#1A1A1E] text-gray-200 p-3 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-accent resize-none placeholder-gray-500 text-sm" placeholder="Type or paste your study notes here... This context will feed your tutor session."></textarea>
                </div>

                <div id="docsTab" class="tab-content hidden">
                    <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center hover:border-purple-accent transition-colors">
                        <input type="file" id="docFile" accept=".pdf,.txt" class="hidden">
                        <label for="docFile" class="cursor-pointer block text-sm text-gray-400" onclick="event.stopPropagation()">
                            <p class="text-2xl mb-2">📥</p>
                            <p class="font-medium text-gray-300">Upload PDF or TXT</p>
                            <p class="text-xs text-gray-500 mt-1" id="docFileName">No file selected</p>
                        </label>
                    </div>
                </div>

                <div id="picsTab" class="tab-content hidden">
                    <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center hover:border-purple-accent transition-colors">
                        <input type="file" id="picFile" accept="image/*" capture="environment" class="hidden">
                        <label for="picFile" class="cursor-pointer block text-sm text-gray-400" onclick="event.stopPropagation()">
                            <p class="text-2xl mb-2">📸</p>
                            <p class="font-medium text-gray-300">Upload or Take Photo</p>
                            <p class="text-xs text-gray-500 mt-1" id="picFileName">No image snapshot loaded</p>
                        </label>
                    </div>
                </div>

                <div id="linksTab" class="tab-content hidden">
                    <div class="flex flex-col gap-2">
                        <input type="url" id="linkUrl" class="w-full bg-[#1A1A1E] text-sm text-gray-200 p-3 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-accent" placeholder="https://example.com/study-guide">
                        <button id="extractLinkBtn" class="bg-purple-accent hover:opacity-90 text-white font-medium py-2 rounded-xl text-xs transition-opacity">Extract Content</button>
                    </div>
                </div>
            </div>
        </main>

        <section class="bg-[#252529] rounded-2xl p-4 border border-gray-800 mb-6">
            <h3 class="text-sm font-bold text-gray-400 mb-3 tracking-wide uppercase">💡 Tutors & Voice Config</h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Tutor Persona</label>
                    <select id="tutorPersona" class="w-full bg-[#1A1A1E] text-xs text-gray-200 p-2.5 rounded-lg border border-gray-700 focus:outline-none" onclick="event.stopPropagation()">
                        <option value="Normal">Normal</option>
                        <option value="Strict Nigerian Lecturer Mode">Strict Nigerian Lecturer</option>
                        <option value="Big Brother/Sister Encouragement">Big Brother/Sister</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Voice Character</label>
                    <select id="voiceCharacter" class="w-full bg-[#1A1A1E] text-xs text-gray-200 p-2.5 rounded-lg border border-gray-700 focus:outline-none" onclick="event.stopPropagation()">
                        <option value="Idera">Idera (Melodic)</option>
                        <option value="Emma">Emma (Deep/Authoritative)</option>
                        <option value="Zainab">Zainab (Soothing)</option>
                        <option value="Osagie">Osagie (Smooth)</option>
                    </select>
                </div>
            </div>

            <button id="startSessionBtn" class="w-full bg-purple-accent hover:opacity-90 text-white font-bold py-3 rounded-xl text-sm transition-all shadow-lg flex justify-center items-center gap-2">
                <span>🚀</span> Start Learning Session
            </button>

            <div class="mt-4 bg-[#1A1A1E] rounded-xl p-3 border border-gray-800 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xs bg-[#252529] p-2 rounded-lg" id="audioStateIcon">⏹️</span>
                    <div>
                        <p class="text-xs font-bold text-gray-300" id="audioTrackTitle">Senseii Audio Deck</p>
                        <p class="text-[10px] text-gray-500" id="audioTrackStatus">Idle</p>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button id="audioPlayBtn" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg text-xs" title="Play">▶️</button>
                    <button id="audioPauseBtn" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg text-xs" title="Pause">⏸️</button>
                    <button id="audioStopBtn" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg text-xs" title="Stop">⏹️</button>
                </div>
                <audio id="hiddenAudioDeck" class="hidden"></audio>
            </div>
        </section>

        <section class="bg-[#252529] rounded-2xl p-4 border border-gray-800 mb-6">
            <h3 class="text-sm font-bold text-gray-400 mb-2 tracking-wide uppercase">📖 Offline Local Dictionary</h3>
            <div class="relative">
                <input type="text" id="dictSearch" placeholder="Type a tricky word..." class="w-full bg-[#1A1A1E] text-xs text-gray-200 p-3 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-accent" onclick="event.stopPropagation()">
                <span id="dbStatus" class="absolute right-3 top-3.5 text-[10px] px-1.5 py-0.5 rounded bg-amber-900/40 text-amber-400">Syncing DB...</span>
            </div>
            <div id="dictResult" class="mt-2 text-xs text-gray-400 bg-[#1A1A1E] p-3 rounded-xl hidden max-h-24 overflow-y-auto"></div>
        </section>
    </div>

    <footer id="geminiSection" class="bg-[#252529] rounded-2xl p-4 border border-gray-800 mt-auto">
        <h3 class="text-sm font-bold text-gray-400 mb-2 tracking-wide uppercase">💬 Ask Senseii</h3>
        <div class="flex gap-2">
            <input type="text" id="geminiQuery" placeholder="Ask anything about your notes..." class="flex-grow bg-[#1A1A1E] text-xs text-gray-200 p-3 rounded-xl border border-gray-700 focus:outline-none focus:border-purple-accent" onclick="event.stopPropagation()">
            <button id="askGeminiBtn" class="bg-purple-accent hover:opacity-90 text-white font-bold px-4 rounded-xl text-xs transition-opacity flex items-center justify-center">Ask</button>
        </div>
        <div id="geminiResponse" class="mt-3 text-xs text-gray-300 bg-[#1A1A1E] p-3 rounded-xl hidden max-h-32 overflow-y-auto border border-gray-800"></div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/audioEngine.js"></script>
    <script src="js/geminiService.js"></script>
    <script src="js/app.js"></script>
</body>
                  </html>
